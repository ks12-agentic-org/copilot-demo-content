name: Deploy to Azure VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PromptPrompter ZIP
        run: |
          cd promptprompter
          zip -j ../files/Leoni_PromptPrompter.zip *.md
          echo "ZIP built: $(ls -lh ../files/Leoni_PromptPrompter.zip | awk '{print $5}')"

      - name: Build Complete Pack ZIP
        run: |
          zip -j files/Leoni_Complete_Pack.zip promptprompter/*.md files/*.docx files/*.xlsx
          echo "Complete ZIP: $(ls -lh files/Leoni_Complete_Pack.zip | awk '{print $5}')"

      - name: Deploy to Azure VM via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "files/*,promptprompter/*.md"
          target: "/opt/services/apps/projects/html/leoni-copilot-demo/"
          strip_components: 0

      - name: Notify
        run: echo "✅ Deployed to https://agent-ui.jens-lab.com/projects/leoni-copilot-demo/"
